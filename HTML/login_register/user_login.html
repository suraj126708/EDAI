<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../css/login_register/ngo_login.css">
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" href="../../img/logo.svg" type="image/x-icons" />
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  

</head>

<body>


  <nav>
    <a class="logo" href="/">
      <img src="../../img/logo-nav.svg" alt="NGO Logo" />
    </a>
    <ul class="nav-bar">
      <li class="nav-bar_item"><a href="../../index.html">Home</a></li>
      <li class="nav-bar_item"><a href="../about.html">About</a></li>
      <li class="nav-bar_item">
        <a href="../rewards.html">Rewards</a>
      </li>
      <li class="nav-bar_item">
        <a href="../contact.html">Contact</a>
      </li>
    </ul>
  </nav>

    <div class="parent">
      <div class="maindiv">
        <form action="/login" method="post" id="loginForm">
          <h2 class="head">Sign In for Donor</h2>
          <div class="namediv">
            <div class="fname">
                <label for="name">Email</label><br>
                <input type="email" id="name" name="email" placeholder="Enter your mail" autofocus >
            </div>
            <div class="lname">
                <label for="name">Password</label><br>
                <input type="password" id="name" placeholder="Enter your password" name="password">
            </div>
            <a href="../index2.html"><button type="submit" value="submit"  class="but">Sign In</button></a>
            <div class="cent">
              <p class="nomargin">or sign up with</p>
              <div class="icons">
                <i class="fa-brands fa-google footfa-brands"></i>
                <i class="fa-brands fa-square-facebook footfa-brands"></i>
              </div>
            
              <p class="already">Don't have a acount sign Up ? <a href="../login_register/user-register.html" class="login">sign up </a></p>
            
            </div>
            </div>
        </div>
        </form>
      </div>
    </div>
</body>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const data = {
      email: formData.get('email'),
      password: formData.get('password')
    };

    try {
      const response = await fetch('/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (result.status === 'success') {
        window.location.href = result.redirect;
      } else {
        alert(result.message);
      }
    } catch (error) {
      console.error('Error:', error);
      alert('An error occurred while logging in. Please try again later.');
    }
  });
</script>
</html>
